<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RogerAI — User Audit Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;border-radius:2px!important}
  body{background:#1a1f1e;color:#e8e5d8;font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .header{padding:14px 20px;border-bottom:1px solid rgba(74,82,64,0.3);display:flex;align-items:center;gap:12px;background:#141817;flex-shrink:0}
  .header h1{font-size:13px;color:#d4a044;text-transform:uppercase;letter-spacing:0.15em;font-weight:600}
  .header .badge{font-size:9px;color:#9a9785;padding:2px 8px;border:1px solid rgba(74,82,64,0.3);text-transform:uppercase}
  .main{display:flex;flex:1;min-height:0}
  .sidebar{width:280px;border-right:1px solid rgba(74,82,64,0.3);display:flex;flex-direction:column;flex-shrink:0}
  .search{padding:10px 12px;border-bottom:1px solid rgba(74,82,64,0.3)}
  .search input{width:100%;padding:7px 10px;background:#141817;border:1px solid rgba(74,82,64,0.3);color:#e8e5d8;font-family:inherit;font-size:11px;outline:none}
  .search input:focus{border-color:rgba(212,160,68,0.4)}
  .user-list{flex:1;overflow-y:auto}
  .user-item{width:100%;padding:10px 14px;text-align:left;cursor:pointer;background:transparent;border:none;border-bottom:1px solid rgba(74,82,64,0.15);border-left:2px solid transparent;color:#e8e5d8;font-family:inherit;font-size:11px;display:flex;align-items:center;gap:10px}
  .user-item:hover{background:rgba(212,160,68,0.04)}
  .user-item.active{background:rgba(212,160,68,0.08);border-left-color:#d4a044}
  .user-item .avatar{width:28px;height:28px;background:#242827;border:1px solid rgba(74,82,64,0.3);display:flex;align-items:center;justify-content:center;font-weight:700;color:#d4a044;font-size:12px;flex-shrink:0}
  .user-item .meta{flex:1;min-width:0}
  .user-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .user-item .sub{font-size:9px;color:#6b6a5e;text-transform:uppercase;margin-top:2px}
  .detail{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column}
  .detail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#6b6a5e;font-size:11px;text-transform:uppercase;letter-spacing:0.15em}
  .profile-bar{padding:16px 20px;border-bottom:1px solid rgba(74,82,64,0.3);flex-shrink:0}
  .profile-bar h2{font-size:15px;color:#d4a044;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
  .profile-bar .uid{font-size:9px;color:#6b6a5e;word-break:break-all}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .badge-pill{font-size:9px;padding:3px 8px;border:1px solid;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
  .stats-row{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid rgba(74,82,64,0.3);flex-shrink:0;flex-wrap:wrap}
  .stat-box{padding:8px 12px;background:#242827;border:1px solid rgba(74,82,64,0.3);text-align:center;min-width:70px}
  .stat-box .num{font-size:18px;font-weight:700;color:#e8e5d8}
  .stat-box .lbl{font-size:8px;color:#6b6a5e;text-transform:uppercase;margin-top:2px}
  .tabs{display:flex;border-bottom:1px solid rgba(74,82,64,0.3);flex-shrink:0;padding:0 20px}
  .tab{padding:8px 14px;font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;color:#6b6a5e}
  .tab:hover{color:#9a9785}
  .tab.active{color:#d4a044;border-bottom-color:#d4a044}
  .tab-content{flex:1;overflow-y:auto;padding:16px 20px}
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .toolbar button{padding:5px 12px;font-family:inherit;font-size:10px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(212,160,68,0.3);background:rgba(212,160,68,0.06);color:#d4a044}
  .toolbar button:hover{background:rgba(212,160,68,0.12)}
  /* Conversation */
  .msg{padding:8px 12px;margin-bottom:6px;border:1px solid rgba(74,82,64,0.2);background:#242827;position:relative}
  .msg.user{border-left:2px solid #5a9c69}
  .msg.assistant,.msg.roger{border-left:2px solid #d4a044}
  .msg .role{font-size:9px;text-transform:uppercase;color:#6b6a5e;margin-bottom:3px;display:flex;justify-content:space-between}
  .msg .role .ts{color:#6b6a5e;font-size:9px}
  .msg .body{font-size:12px;line-height:1.5;color:#e8e5d8;white-space:pre-wrap;word-break:break-word}
  /* Transmissions */
  .tx{padding:10px 12px;margin-bottom:8px;border:1px solid rgba(74,82,64,0.2);background:#242827}
  .tx .intent{display:inline-block;font-size:9px;padding:2px 6px;background:rgba(212,160,68,0.1);border:1px solid rgba(212,160,68,0.3);color:#d4a044;text-transform:uppercase;margin-right:6px}
  .tx .outcome{display:inline-block;font-size:9px;padding:2px 6px;text-transform:uppercase}
  .tx .outcome.success{background:rgba(90,156,105,0.1);border:1px solid rgba(90,156,105,0.3);color:#5a9c69}
  .tx .outcome.error{background:rgba(168,72,50,0.1);border:1px solid rgba(168,72,50,0.3);color:#a84832}
  .tx .transcript{font-size:12px;color:#e8e5d8;margin:6px 0}
  .tx .response{font-size:11px;color:#9a9785;margin-top:4px;padding-left:10px;border-left:2px solid rgba(212,160,68,0.3)}
  /* Tasks & Reminders */
  .item-row{padding:8px 12px;margin-bottom:4px;border:1px solid rgba(74,82,64,0.2);background:#242827;display:flex;gap:10px;align-items:flex-start}
  .item-row .status{font-size:9px;padding:2px 6px;text-transform:uppercase;flex-shrink:0}
  .item-row .text{font-size:12px;color:#e8e5d8;flex:1}
  .item-row .due{font-size:9px;color:#6b6a5e;flex-shrink:0}
  .priority-1{color:#a84832}.priority-2{color:#d4a044}.priority-3{color:#5a9c69}
  /* Memory */
  .mem{padding:8px 12px;margin-bottom:4px;border:1px solid rgba(74,82,64,0.2);background:#242827;display:flex;gap:8px}
  .mem .cat{font-size:9px;padding:2px 6px;background:rgba(212,160,68,0.08);border:1px solid rgba(212,160,68,0.2);color:#d4a044;text-transform:uppercase;flex-shrink:0;align-self:flex-start}
  .mem .fact{font-size:12px;color:#e8e5d8;flex:1}
  .mem .conf{font-size:9px;color:#6b6a5e;flex-shrink:0}
  .empty-tab{padding:40px;text-align:center;color:#6b6a5e;font-size:11px;text-transform:uppercase;letter-spacing:0.1em}
  .loading{color:#6b6a5e;font-size:11px;padding:20px;text-transform:uppercase}
</style>
</head>
<body>

<div class="header">
  <h1>▸ RogerAI User Audit</h1>
  <span class="badge">Testing & QA Tool</span>
  <span class="badge" id="user-count">0 users</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="search"><input type="text" id="search" placeholder="Search by name or ID…"></div>
    <div class="user-list" id="user-list"></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">Select a user to inspect</div>
  </div>
</div>

<script>
const SB_URL = 'https://krbfhiupcquddguorowe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtyYmZoaXVwY3F1ZGRndW9yb3dlIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjU5NzE2MiwiZXhwIjoyMDkyMTczMTYyfQ.TIsW3ZlJmCcdIx0GMWZWDMnU98Xpm6QzlKkRT55fwqg';
const sb = supabase.createClient(SB_URL, SB_KEY);

let users = [];
let selectedId = null;
let tabData = {};
const TABS = ['conversations','transmissions','tasks','reminders','memory'];

function rel(iso) {
  if (!iso) return '—';
  const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (m < 1) return 'NOW'; if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  return h < 24 ? h+'h ago' : Math.floor(h/24)+'d ago';
}

function ts(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

async function loadUsers() {
  const {data} = await sb.from('user_preferences')
    .select('user_id, display_name, roger_mode, language, timezone, onboarding_complete, onboarding_step, islamic_mode, response_style, updated_at')
    .order('updated_at', {ascending: false});
  users = data || [];
  document.getElementById('user-count').textContent = users.length + ' users';
  renderList();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('user-list');
  const filtered = users.filter(u => !q || (u.display_name||'').toLowerCase().includes(q) || u.user_id.toLowerCase().includes(q));
  list.innerHTML = filtered.map(u => `
    <button class="user-item ${u.user_id===selectedId?'active':''}" onclick="selectUser('${u.user_id}')">
      <div class="avatar">${(u.display_name||u.user_id)[0].toUpperCase()}</div>
      <div class="meta">
        <div class="name">${u.display_name||'Unnamed'}</div>
        <div class="sub">${u.roger_mode} · ${u.language} · ${rel(u.updated_at)}</div>
      </div>
    </button>
  `).join('');
}

async function selectUser(uid) {
  selectedId = uid;
  tabData = {};
  renderList();
  const u = users.find(x => x.user_id === uid);
  if (!u) return;

  // Fetch stats
  const [mem,rem,tsk,tx,conv] = await Promise.all([
    sb.from('memories').select('id',{count:'exact',head:true}).eq('user_id',uid),
    sb.from('reminders').select('id',{count:'exact',head:true}).eq('user_id',uid),
    sb.from('tasks').select('id',{count:'exact',head:true}).eq('user_id',uid),
    sb.from('transmissions').select('id',{count:'exact',head:true}).eq('user_id',uid),
    sb.from('conversation_history').select('id',{count:'exact',head:true}).eq('user_id',uid),
  ]);

  const stats = {memories:mem.count||0, reminders:rem.count||0, tasks:tsk.count||0, transmissions:tx.count||0, conversations:conv.count||0};

  const onb = u.onboarding_complete;
  document.getElementById('detail').innerHTML = `
    <div class="profile-bar">
      <h2>${u.display_name||'Unnamed'}</h2>
      <div class="uid">${u.user_id}</div>
      <div class="badges">
        <span class="badge-pill" style="border-color:${onb?'rgba(90,156,105,0.4)':'rgba(212,160,68,0.4)'};color:${onb?'#5a9c69':'#d4a044'}">${onb?'✓ Onboarded':'⏳ Step '+u.onboarding_step}</span>
        <span class="badge-pill" style="border-color:rgba(74,82,64,0.3);color:#9a9785">${u.language} · ${u.timezone||'UTC'}</span>
        <span class="badge-pill" style="border-color:rgba(74,82,64,0.3);color:#9a9785">Mode: ${u.roger_mode}</span>
        <span class="badge-pill" style="border-color:rgba(74,82,64,0.3);color:#9a9785">Style: ${u.response_style||'—'}</span>
        ${u.islamic_mode?'<span class="badge-pill" style="border-color:rgba(74,82,64,0.3);color:#9a9785">☪ Islamic</span>':''}
      </div>
    </div>
    <div class="stats-row">
      ${[['CONV',stats.conversations],['TX',stats.transmissions],['MEM',stats.memories],['REM',stats.reminders],['TASK',stats.tasks]].map(([l,v])=>`<div class="stat-box"><div class="num">${v}</div><div class="lbl">${l}</div></div>`).join('')}
    </div>
    <div class="tabs" id="tabs">
      ${TABS.map((t,i)=>`<button class="tab ${i===0?'active':''}" onclick="switchTab('${t}',this)">${t}</button>`).join('')}
    </div>
    <div class="tab-content" id="tab-content"><div class="loading">Loading…</div></div>
  `;
  switchTab('conversations', document.querySelector('.tab.active'));
}

async function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="loading">Loading…</div>';

  if (!tabData[tab]) {
    try { tabData[tab] = await fetchTab(tab); } catch(e) { tabData[tab] = []; }
  }
  renderTab(tab, tabData[tab]);
}

async function fetchTab(tab) {
  const uid = selectedId;
  switch(tab) {
    case 'conversations': {
      const {data} = await sb.from('conversation_history').select('id,role,content,created_at').eq('user_id',uid).order('created_at',{ascending:true}).limit(200);
      return data||[];
    }
    case 'transmissions': {
      const {data} = await sb.from('transmissions').select('id,transcript,roger_response,intent,outcome,created_at').eq('user_id',uid).order('created_at',{ascending:false}).limit(100);
      return data||[];
    }
    case 'tasks': {
      const {data} = await sb.from('tasks').select('id,text,priority,status,due_at,created_at').eq('user_id',uid).order('created_at',{ascending:false});
      return data||[];
    }
    case 'reminders': {
      const {data} = await sb.from('reminders').select('id,text,status,due_at,due_location,created_at').eq('user_id',uid).order('created_at',{ascending:false});
      return data||[];
    }
    case 'memory': {
      const {data} = await sb.from('memories').select('id,fact,category,confidence,created_at').eq('user_id',uid).order('created_at',{ascending:false}).limit(100);
      return data||[];
    }
  }
}

function copyJSON(tab) {
  const d = tabData[tab] || [];
  navigator.clipboard.writeText(JSON.stringify(d, null, 2));
  const btn = document.getElementById('copy-btn');
  if(btn){btn.textContent='✓ Copied!'; setTimeout(()=>btn.textContent='Copy JSON',1500);}
}

function exportCSV(tab) {
  const d = tabData[tab] || [];
  if(!d.length) return;
  const keys = Object.keys(d[0]);
  const csv = [keys.join(','), ...d.map(r=>keys.map(k=>'"'+(String(r[k]||'').replace(/"/g,'""'))+'"').join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `roger_${tab}_${selectedId.slice(0,8)}.csv`;
  a.click();
}

function renderTab(tab, data) {
  const el = document.getElementById('tab-content');
  if (!data.length) { el.innerHTML = '<div class="empty-tab">No data found</div>'; return; }

  let toolbar = `<div class="toolbar"><button id="copy-btn" onclick="copyJSON('${tab}')">Copy JSON</button><button onclick="exportCSV('${tab}')">Export CSV</button><span style="font-size:9px;color:#6b6a5e;align-self:center">${data.length} records</span></div>`;
  let html = toolbar;

  switch(tab) {
    case 'conversations':
      html += data.map(m=>`<div class="msg ${m.role}"><div class="role"><span>${m.role.toUpperCase()}</span><span class="ts">${ts(m.created_at)}</span></div><div class="body">${esc(m.content)}</div></div>`).join('');
      break;
    case 'transmissions':
      html += data.map(t=>`<div class="tx"><div><span class="intent">${t.intent||'unknown'}</span>${t.outcome?`<span class="outcome ${t.outcome==='success'?'success':'error'}">${t.outcome}</span>`:''}<span style="font-size:9px;color:#6b6a5e;margin-left:8px">${ts(t.created_at)}</span></div><div class="transcript">🎙 ${esc(t.transcript)}</div>${t.roger_response?`<div class="response">📡 ${esc(t.roger_response)}</div>`:''}</div>`).join('');
      break;
    case 'tasks':
      html += data.map(t=>`<div class="item-row"><span class="status" style="background:${t.status==='done'?'rgba(90,156,105,0.1)':'rgba(212,160,68,0.08)'};border:1px solid ${t.status==='done'?'rgba(90,156,105,0.3)':'rgba(212,160,68,0.3)'};color:${t.status==='done'?'#5a9c69':'#d4a044'}">${t.status}</span><span class="text priority-${t.priority}">[P${t.priority}] ${esc(t.text)}</span><span class="due">${t.due_at?ts(t.due_at):''}</span></div>`).join('');
      break;
    case 'reminders':
      html += data.map(r=>`<div class="item-row"><span class="status" style="background:${r.status==='done'?'rgba(90,156,105,0.1)':'rgba(212,160,68,0.08)'};border:1px solid ${r.status==='done'?'rgba(90,156,105,0.3)':'rgba(212,160,68,0.3)'};color:${r.status==='done'?'#5a9c69':'#d4a044'}">${r.status}</span><span class="text">${esc(r.text)}</span><span class="due">${r.due_at?ts(r.due_at):''}${r.due_location?' 📍'+esc(r.due_location):''}</span></div>`).join('');
      break;
    case 'memory':
      html += data.map(m=>`<div class="mem"><span class="cat">${m.category||'general'}</span><span class="fact">${esc(m.fact)}</span><span class="conf">${m.confidence!=null?Math.round(m.confidence*100)+'%':''}</span></div>`).join('');
      break;
  }
  el.innerHTML = html;
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

document.getElementById('search').addEventListener('input', renderList);
loadUsers();
</script>
</body>
</html>

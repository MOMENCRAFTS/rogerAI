workflows:
  roger-ios:
    name: Roger AI — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      node: v22
      groups:
        - roger_env
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.rogerai.app

    scripts:
      # ── 1. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        script: |
          set -e
          npm ci --legacy-peer-deps
          # Fix missing darwin-arm64 rollup binary (Windows lockfile issue)
          npm install @rollup/rollup-darwin-arm64 --no-save 2>/dev/null || true
          echo "✓ Dependencies installed"

      # ── 1b. Patch @capacitor-community/contacts for Capacitor 8 SPM ─────
      - name: Patch contacts plugin SPM
        script: |
          # @capacitor-community/contacts v7.2.0 pins capacitor-swift-pm to 7.x
          # but our project uses 8.x — patch it to accept 8.0.0+
          CONTACTS_PKG="node_modules/@capacitor-community/contacts/Package.swift"
          if [ -f "$CONTACTS_PKG" ]; then
            sed -i '' 's/from: "7.0.0"/from: "8.0.0"/g' "$CONTACTS_PKG"
            echo "✓ Patched contacts Package.swift: $(grep capacitor-swift-pm "$CONTACTS_PKG")"
          else
            echo "⚠ contacts Package.swift not found — skipping patch"
          fi

      # ── 2. Write .env.local from Codemagic secrets ───────────────────────
      - name: Write environment file
        script: |
          cat > .env.local << ENVEOF
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          VITE_OPENAI_API_KEY=$VITE_OPENAI_API_KEY
          VITE_ADMIN_EMAILS=$VITE_ADMIN_EMAILS
          VITE_VAPID_PUBLIC_KEY=$VITE_VAPID_PUBLIC_KEY
          VITE_GOOGLE_MAPS_API_KEY=$VITE_GOOGLE_MAPS_API_KEY
          VITE_NEWS_API_KEY=$VITE_NEWS_API_KEY
          VITE_FINNHUB_API_KEY=$VITE_FINNHUB_API_KEY
          VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID
          VITE_TUYA_APP_KEY=$VITE_TUYA_APP_KEY
          VITE_TUYA_APP_SECRET=$VITE_TUYA_APP_SECRET
          ENVEOF
          echo "✓ .env.local written"

      # ── 3. Build web app (bypass tsc — fails on CI) ──────────────────────
      - name: Build web app (Vite)
        script: |
          set -e
          npx vite build
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found — Vite build failed silently!"
            exit 1
          fi
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "✓ Web build complete: $FILE_COUNT files in dist/"

      # ── 4. Sync iOS + force-copy web assets ──────────────────────────────
      - name: Sync iOS and copy web assets
        script: |
          # cap sync may fail on CI — not fatal, we copy manually
          npx cap sync ios 2>&1 || echo "⚠ cap sync failed — copying assets manually"
          npx cap copy ios 2>&1 || echo "⚠ cap copy failed — copying assets manually"

          # Force-copy web assets into iOS bundle
          APP_PUBLIC="ios/App/App/public"
          rm -rf "$APP_PUBLIC"
          mkdir -p "$APP_PUBLIC"
          cp -R dist/* "$APP_PUBLIC/"

          # Validate assets are present
          FILE_COUNT=$(find "$APP_PUBLIC" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: $APP_PUBLIC is empty after asset copy!"
            exit 1
          fi
          echo "✓ Web assets synced: $FILE_COUNT files in $APP_PUBLIC"

      # ── 5. Ensure iOS config files exist ─────────────────────────────────
      - name: Ensure iOS config files
        script: |
          CONFIG="ios/App/App/capacitor.config.json"
          if [ ! -f "$CONFIG" ]; then
            echo "⚠ capacitor.config.json missing — creating stub"
            cat > "$CONFIG" << 'EOF'
          {"appId":"com.rogerai.app","appName":"Roger AI","webDir":"public","bundledWebRuntime":false}
          EOF
          fi

          XML="ios/App/App/config.xml"
          if [ ! -f "$XML" ]; then
            echo "⚠ config.xml missing — creating stub"
            echo '<?xml version="1.0" encoding="UTF-8"?><widget id="com.rogerai.app" version="1.0.0"><name>Roger AI</name></widget>' > "$XML"
          fi
          echo "✓ iOS config files present"

      # ── 6. Set up code signing ───────────────────────────────────────────
      - name: Set up code signing
        script: |
          set -e

          # Step 1: Generate a fresh RSA private key for this build
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          keychain initialize

          # Step 2: Revoke ALL existing Distribution certs (JSON parsing — reliable)
          # Apple allows max 2 active Distribution certs. We revoke all so we
          # can create a fresh one that matches our newly generated private key.
          echo "=== Revoking existing Distribution certificates ==="
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            RAW=$(app-store-connect certificates list --type "$CERT_TYPE" --json 2>/dev/null || echo '{}')
            echo "$RAW" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    certs = data.get('data', [])
    for c in certs:
        print(c['id'])
except:
    pass
" | while read CID; do
              echo "  Revoking $CERT_TYPE cert: $CID"
              app-store-connect certificates revoke "$CID" 2>&1 || \
                echo "  (Could not revoke $CID — skipping)"
            done
          done
          echo "=== Revocation complete ==="

          # Step 3: Fetch or CREATE distribution cert + provisioning profile
          # --create will auto-create both cert and profile if missing
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

          # Step 4: Extract provisioning profile UUID + Team ID
          PP_PATH=$(find \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -z "$PP_PATH" ]; then
            echo "ERROR: No provisioning profile found after fetch"
            exit 1
          fi
          security cms -D -i "$PP_PATH" > /tmp/pp.plist
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/pp.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/pp.plist)
          echo "Profile UUID: $PP_UUID  Team ID: $TEAM_ID"
          printf '%s' "$PP_UUID" > /tmp/pp_uuid.txt
          printf '%s' "$TEAM_ID" > /tmp/team_id.txt

          # Step 5: Patch Xcode project — Manual signing + Team ID
          find ios -name "project.pbxproj" | while read pbxf; do
            perl -i -pe "
              s/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g;
              s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g;
            " "$pbxf"
            echo "Patched: $pbxf"
          done

          xcode-project use-profiles
          echo "✓ Code signing configured"

      # ── 7. Increment build number ────────────────────────────────────────
      - name: Increment build number
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-$(($(date +%s) / 60))}
          echo "Build number: $BUILD_NUM"
          cd ios/App
          agvtool new-version -all "$BUILD_NUM" 2>/dev/null || \
            find . -name "project.pbxproj" -exec perl -i -pe "s/CURRENT_PROJECT_VERSION = \\d+/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" {} +
          agvtool new-marketing-version "1.0.0" 2>/dev/null || true
          echo "=== Version info ==="
          grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION" App.xcodeproj/project.pbxproj || true

      # ── 8. Patch Info.plist ──────────────────────────────────────────────
      - name: Patch Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :UIRequiredDeviceCapabilities" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities:0 string arm64" "$PLIST"
          echo "✓ Info.plist patched"

      # ── 9. Build IPA ─────────────────────────────────────────────────────
      - name: Build IPA
        script: |
          set -e
          cd ios/App

          PP_UUID=$(cat /tmp/pp_uuid.txt)
          TEAM_ID=$(cat /tmp/team_id.txt)

          # 1. Resolve SPM dependencies first
          echo "=== Resolving SPM packages ==="
          xcodebuild -project "App.xcodeproj" \
            -scheme "App" \
            -resolvePackageDependencies \
            2>&1 | tail -20

          # 2. Archive
          echo "=== Archiving ==="
          xcodebuild archive \
            -project "App.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE="$PP_UUID" \
            -allowProvisioningUpdates

          # 3. Create ExportOptions.plist dynamically
          cat > /tmp/ExportOptions.plist <<EOPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rogerai.app</key>
                  <string>${PP_UUID}</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOPLIST

          # 4. Export IPA
          echo "=== Exporting IPA ==="
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          echo "=== IPA output ==="
          ls -la build/ios/ipa/
          IPA_COUNT=$(find build/ios/ipa -name "*.ipa" | wc -l)
          if [ "$IPA_COUNT" -eq 0 ]; then
            echo "ERROR: No IPA file produced!"
            exit 1
          fi
          echo "SUCCESS: Found $IPA_COUNT IPA file(s)"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # RogerAI testers is an Internal group — internal groups auto-receive
        # all builds, so no explicit assignment is needed (API rejects it anyway)
      email:
        recipients:
          - docpharaon@gmail.com
        notify:
          success: true
          failure: true

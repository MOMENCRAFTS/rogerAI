[env:esp32-a1s]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; ── Audio (ES8388 codec via AudioKit HAL) ──
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-audiokit.git

    ; ── Display (GC9A01 round TFT 240x240) ──
    bodmer/TFT_eSPI

    ; ── Networking ──
    https://github.com/tzapu/WiFiManager.git
    bblanchon/ArduinoJson@^7.0.0

    ; ── QR Code generation (for device pairing) ──
    ricmoo/QRCode@^0.0.1

build_flags =
    ; ── AudioKit board selection ──
    -DAUDIOKIT_BOARD=5

    ; ── TFT_eSPI display config (GC9A01 round 240x240) ──
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=22
    -DTFT_RST=19
    -DSPI_FREQUENCY=80000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; ── Memory ──
    -DBOARD_HAS_PSRAM=1
